<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To the Bottom – Rules</title>

  <!-- Bebas Neue (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy: #13424b;
      --navy2:#023947;
      --beige:#f1ead0;
      --beige2:#e3c78d;
      --ink:#032a33;
      --glass: rgba(255,255,255,.06);
      --stroke: rgba(243,226,179,.22);
      --radius: 18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      color:var(--beige);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 70% 10%, #13424b 0%, var(--navy) 45%, var(--navy2) 100%);
      overflow:hidden;
    }

    /* Star field */
    body::before{
      content:"";
      position:fixed; inset:0;
      background-image:
        radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,.9) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 28% 62%, rgba(255,255,255,.7) 40%, transparent 45%),
        radial-gradient(1.2px 1.2px at 72% 28%, rgba(255,255,255,.65) 40%, transparent 45%),
        radial-gradient(1.8px 1.8px at 84% 78%, rgba(255,255,255,.8) 40%, transparent 45%),
        radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,.55) 40%, transparent 45%),
        radial-gradient(1px 1px at 7% 80%, rgba(255,255,255,.5) 40%, transparent 45%),
        radial-gradient(1.3px 1.3px at 92% 12%, rgba(255,255,255,.6) 40%, transparent 45%);
      opacity:.75;
      pointer-events:none;
      filter: drop-shadow(0 0 6px rgba(255,255,255,.12));
    }

    /* Subtle paper grain */
    body::after{
      content:"";
      position:fixed; inset:0;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 3px);
      opacity:.08;
      pointer-events:none;
      mix-blend-mode: overlay;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .card{
      width:min(400px, 92vw);
    }

    .title{
      font-family: "Bebas Neue", system-ui, sans-serif;
      letter-spacing: 4px;
      font-size: 54px;
      line-height: 1;
      margin: 6px 0 8px;
      text-transform: uppercase;
      text-shadow: 0 10px 24px rgba(0,0,0,.5);
    }

    .tagline{
      margin: 0 0 18px;
      opacity: .88;
      font-size: 16px;
      line-height: 1.35;
    }
    
    .logo{
      display:flex;
      margin: auto;
    }

    .btn-primary{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      width:100%;
      text-decoration:none;
      background: var(--beige2);
      color: var(--ink);
      padding: 16px 16px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 500;
      border:1px solid rgba(0,0,0,.15);
      transition: transform .12s ease, box-shadow .12s ease;
      margin-top: 50px;
    }

    .btn-primary:hover{
      background: #E3BF76;
    }  

    .btn-primary:active{
      background: #E3BF76;
    }   

    .btn-secondary{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      width:100%;
      text-decoration:none;
      background: var(--beige);
      color: var(--ink);
      padding: 16px 16px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 500;
      border:1px solid rgba(0,0,0,.15);
      transition: transform .12s ease, box-shadow .12s ease;
      margin-top: 16px;
    }
    
    .btn-secondary:hover{
      background: #F1E5B7;
    }  

    .btn-secondary:active{
      background: #F1E5B7;
    } 

    .btn small{
      font-weight: 650;
      opacity: .78;
    }

    .meta{
      text-align: center;
      flex-wrap:wrap;
      margin-top: 30px;
      font-size: 14px;
      font-weight: 300;
      color: var(--beige);
    }

    .foot{
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--beige2);
    }

  </style>
</head>

<body>
  <div class="wrap">
    <main class="card" role="main" aria-label="To the Bottom rules">

      <img class="logo"
        src="TotheBottomLogo.svg"
        alt="to the bottom deckbuilding game"
        height="244"
        width="300" />

      <a class="btn-primary" href="To%20the%20bottom%20Rules.pdf">
        <span>English Rules</span>
      </a>

      <a class="btn-secondary" href="To%20the%20bottom%20Rules_CZ.pdf">
        <span>Česká pravidla</span>
      </a>

      <div class="meta">
        On mobile, tap once to open the PDF file with rules, then use your reader’s search or bookmarks.
      </div>

      <div class="foot">
        Author: Jakub Jedlinský
      </div>
    </main>
  </div>
</body>
</html>
