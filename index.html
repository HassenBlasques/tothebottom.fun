<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To the Bottom – Rules</title>

  <!-- Bebas Neue (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy: #0b2239;
      --navy2:#081a2c;
      --beige:#f3e2b3;
      --beige2:#e9d49c;
      --ink:#06121f;
      --glass: rgba(255,255,255,.06);
      --stroke: rgba(243,226,179,.22);
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --radius: 18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      color:var(--beige);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 70% 10%, #123a5c 0%, var(--navy) 45%, var(--navy2) 100%);
      overflow:hidden;
    }

    /* Star field */
    body::before{
      content:"";
      position:fixed; inset:0;
      background-image:
        radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,.9) 40%, transparent 45%),
        radial-gradient(1.5px 1.5px at 28% 62%, rgba(255,255,255,.7) 40%, transparent 45%),
        radial-gradient(1.2px 1.2px at 72% 28%, rgba(255,255,255,.65) 40%, transparent 45%),
        radial-gradient(1.8px 1.8px at 84% 78%, rgba(255,255,255,.8) 40%, transparent 45%),
        radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,.55) 40%, transparent 45%),
        radial-gradient(1px 1px at 7% 80%, rgba(255,255,255,.5) 40%, transparent 45%),
        radial-gradient(1.3px 1.3px at 92% 12%, rgba(255,255,255,.6) 40%, transparent 45%);
      opacity:.75;
      pointer-events:none;
      filter: drop-shadow(0 0 6px rgba(255,255,255,.12));
    }

    /* Subtle paper grain */
    body::after{
      content:"";
      position:fixed; inset:0;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 3px);
      opacity:.08;
      pointer-events:none;
      mix-blend-mode: overlay;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .card{
      width:min(520px, 92vw);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(10px);
    }

    .title{
      font-family: "Bebas Neue", system-ui, sans-serif;
      letter-spacing: 4px;
      font-size: 54px;
      line-height: 1;
      margin: 6px 0 8px;
      text-transform: uppercase;
      text-shadow: 0 10px 24px rgba(0,0,0,.5);
    }

    .tagline{
      margin: 0 0 18px;
      opacity: .88;
      font-size: 16px;
      line-height: 1.35;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(243,226,179,.45), transparent);
      margin: 16px 0 18px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      width:100%;
      text-decoration:none;
      background: linear-gradient(180deg, var(--beige), var(--beige2));
      color: var(--ink);
      padding: 16px 16px;
      border-radius: 14px;
      font-weight: 800;
      border:1px solid rgba(0,0,0,.15);
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      transition: transform .12s ease, box-shadow .12s ease;
      margin-top: 12px;
    }

    .btn:active{ transform: translateY(1px); }

    .btn small{
      font-weight: 650;
      opacity: .78;
    }

    .arrow{
      font-size: 18px;
      opacity:.75;
    }

    .meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 14px;
      opacity:.75;
      font-size: 12px;
    }

    .pill{
      border:1px solid rgba(243,226,179,.22);
      background: rgba(255,255,255,.05);
      padding: 6px 10px;
      border-radius: 999px;
    }

    .foot{
      margin-top: 16px;
      opacity: .72;
      font-size: 12px;
      line-height: 1.35;
    }

    /* Optional tiny anchor mark */
    .mark{
      display:flex;
      align-items:center;
      gap:10px;
      opacity:.9;
      margin-bottom: 6px;
    }
    .mark svg{ opacity:.85; }
  </style>
</head>

<body>
  <div class="wrap">
    <main class="card" role="main" aria-label="To the Bottom rules">
      <div class="mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3v12" stroke="rgba(243,226,179,.9)" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 8h8" stroke="rgba(243,226,179,.9)" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M6 14c0 3 2.5 7 6 7s6-4 6-7" stroke="rgba(243,226,179,.9)" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M9 18l-3 3M15 18l3 3" stroke="rgba(243,226,179,.9)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span style="font-size:12px; letter-spacing:1px;">RULES</span>
      </div>

      <h1 class="title">TO THE BOTTOM</h1>
      <p class="tagline">A game of sinking odds and rising tension</p>

      <div class="divider"></div>

      <!-- Update filenames here if needed -->
      <a class="btn" href="To%20the%20bottom%20Rules.pdf">
        <span>English Rules<br><small>PDF</small></span>
        <span class="arrow">›</span>
      </a>

      <a class="btn" href="To%20the%20bottom%20Rules.pdf_CZ">
        <span>Česká pravidla<br><small>PDF</small></span>
        <span class="arrow">›</span>
      </a>

      <div class="meta">
        <span class="pill">Deck-building card game</span>
        <span class="pill">Author: Jakub Jedlinský</span>
      </div>

      <div class="foot">
        Tip: on mobile, tap once to open the PDF, then use your reader’s search or bookmarks.
      </div>
    </main>
  </div>
</body>
</html>
